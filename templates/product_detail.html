{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <img src="{{ product.image_url }}" class="img-fluid" alt="{{ product.name }}">
    </div>
    <div class="col-md-6">
        <h1>{{ product.name }}</h1>
        <h3 class="text-success">₹{{ "%.2f"|format(product.price) }}</h3>
        <p>{{ product.description }}</p>
        <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-lg btn-success">Add to Cart</a>
        <a href="{{ url_for('index') }}" class="btn btn-lg btn-secondary">Continue Shopping</a>
    </div>
</div>
{% endblock %}
